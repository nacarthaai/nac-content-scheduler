<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NacArtha · Pipeline</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #FFD700;
      --gold-dim: rgba(255,215,0,0.15);
      --gold-glow: rgba(255,215,0,0.4);
      --bg: #060608;
      --card: #0e0e12;
      --card2: #13131a;
      --text: rgba(255,255,255,0.85);
      --muted: rgba(255,255,255,0.3);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Animated grid background ── */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,215,0,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,215,0,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridDrift 25s linear infinite;
      pointer-events: none;
    }
    @keyframes gridDrift {
      0%   { transform: translateY(0); }
      100% { transform: translateY(48px); }
    }

    /* ── Radial glow behind card ── */
    .glow-orb {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,215,0,0.06) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: breathe 6s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.6; transform: translate(-50%,-50%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%,-50%) scale(1.12); }
    }

    /* ── Floating particles ── */
    .particles { position: fixed; inset: 0; pointer-events: none; }
    .p {
      position: absolute;
      width: 2px; height: 2px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0;
      animation: floatUp var(--d) var(--delay) ease-in infinite;
    }
    @keyframes floatUp {
      0%   { opacity: 0;   transform: translateY(0) scale(0); }
      10%  { opacity: 0.6; transform: translateY(-20px) scale(1); }
      90%  { opacity: 0.2; }
      100% { opacity: 0;   transform: translateY(-200px) scale(0.3); }
    }

    /* ── 3D Card ── */
    .scene {
      perspective: 1200px;
      position: relative;
      z-index: 10;
    }

    .card {
      background: linear-gradient(145deg, var(--card) 0%, var(--card2) 100%);
      border: 1px solid rgba(255,215,0,0.12);
      border-radius: 28px;
      padding: 56px 72px;
      width: 520px;
      text-align: center;
      position: relative;
      overflow: hidden;
      transform: rotateX(6deg) rotateY(-1deg);
      transform-style: preserve-3d;
      transition: transform 0.4s cubic-bezier(0.23,1,0.32,1),
                  box-shadow 0.4s cubic-bezier(0.23,1,0.32,1);
      box-shadow:
        0 0 0 1px rgba(255,215,0,0.06),
        0 32px 64px rgba(0,0,0,0.6),
        0 0 80px rgba(255,215,0,0.04);
    }

    .card:hover {
      transform: rotateX(0deg) rotateY(0deg) translateY(-6px);
      box-shadow:
        0 0 0 1px rgba(255,215,0,0.18),
        0 40px 80px rgba(0,0,0,0.7),
        0 0 120px rgba(255,215,0,0.08);
    }

    /* shimmer line at top */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,215,0,0.5), transparent);
    }

    /* ── Header ── */
    .eyebrow {
      font-size: 11px;
      letter-spacing: 5px;
      color: rgba(255,215,0,0.4);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .logo {
      font-size: 34px;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: -1px;
      text-shadow: 0 0 40px rgba(255,215,0,0.35);
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 1px;
      margin-bottom: 44px;
    }

    /* ── Status pill ── */
    .status-row {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 8px 18px;
      margin-bottom: 40px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: all 0.3s;
    }
    .status-row.running {
      background: rgba(255,215,0,0.06);
      border-color: rgba(255,215,0,0.2);
      color: var(--gold);
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 8px #4ade80, 0 0 20px rgba(74,222,128,0.4);
      animation: blink 2.4s ease-in-out infinite;
      flex-shrink: 0;
    }
    .dot.running {
      background: var(--gold);
      box-shadow: 0 0 8px var(--gold), 0 0 24px var(--gold-glow);
      animation: spin-dot 0.7s ease-in-out infinite alternate;
    }
    @keyframes blink {
      0%,100% { opacity:1; }
      50%      { opacity:0.4; }
    }
    @keyframes spin-dot {
      0%   { transform: scale(1);   opacity: 1; }
      100% { transform: scale(1.5); opacity: 0.6; }
    }

    /* ── CTA Button ── */
    .btn-wrap { position: relative; display: inline-block; }

    .btn-glow {
      position: absolute;
      inset: -8px;
      border-radius: 20px;
      background: radial-gradient(ellipse, var(--gold-glow) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .btn-wrap:hover .btn-glow { opacity: 1; }

    .btn {
      position: relative;
      background: linear-gradient(135deg, #FFD700 0%, #F59E0B 50%, #D97706 100%);
      color: #000;
      border: none;
      padding: 18px 52px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.23,1,0.32,1);
      box-shadow:
        0 6px 0 rgba(0,0,0,0.4),
        0 12px 32px rgba(255,215,0,0.25);
      transform: translateY(0);
      z-index: 1;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow:
        0 9px 0 rgba(0,0,0,0.4),
        0 18px 48px rgba(255,215,0,0.35);
    }

    .btn:active:not(:disabled) {
      transform: translateY(3px);
      box-shadow:
        0 2px 0 rgba(0,0,0,0.4),
        0 6px 16px rgba(255,215,0,0.15);
    }

    .btn:disabled {
      background: linear-gradient(135deg, #444, #333);
      cursor: not-allowed;
      box-shadow: 0 4px 0 rgba(0,0,0,0.3);
      transform: none;
      color: rgba(255,255,255,0.3);
    }

    /* ── Message ── */
    .msg {
      margin-top: 24px;
      font-size: 13px;
      min-height: 20px;
      color: var(--muted);
      letter-spacing: 0.3px;
      transition: all 0.3s;
    }
    .msg.ok  { color: #4ade80; }
    .msg.err { color: #f87171; }
    .msg.running { color: var(--gold); }

    /* ── Stats ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,215,0,0.1), transparent);
      margin: 44px 0 32px;
    }

    .stats {
      display: flex;
      justify-content: space-around;
    }

    .stat-val {
      font-size: 26px;
      font-weight: 800;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(255,215,0,0.3);
      line-height: 1;
    }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 6px;
    }

    /* ── Progress bar (hidden by default) ── */
    .progress-wrap {
      height: 3px;
      background: rgba(255,255,255,0.05);
      border-radius: 2px;
      margin-top: 28px;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .progress-wrap.visible { opacity: 1; }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #FFD700, #F59E0B);
      border-radius: 2px;
      box-shadow: 0 0 8px rgba(255,215,0,0.6);
      transition: width 18s cubic-bezier(0.1,0,0.3,1);
    }
  </style>
</head>
<body>

  <div class="grid-bg"></div>
  <div class="glow-orb"></div>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <div class="scene" id="scene">
    <div class="card" id="card">
      <div class="eyebrow">Content Engine</div>
      <div class="logo">NacArtha</div>
      <div class="subtitle">EN &nbsp;·&nbsp; हिन्दी &nbsp;·&nbsp; తెలుగు</div>

      <div class="status-row" id="status-row">
        <div class="dot" id="dot"></div>
        <span id="status-text">Scheduler Online</span>
      </div>

      <div class="btn-wrap">
        <div class="btn-glow"></div>
        <button class="btn" id="btn" onclick="triggerPipeline()">
          ⚡&nbsp; Generate Videos
        </button>
      </div>

      <div class="msg" id="msg"></div>

      <div class="progress-wrap" id="prog-wrap">
        <div class="progress-bar" id="prog-bar"></div>
      </div>

      <div class="divider"></div>

      <div class="stats">
        <div>
          <div class="stat-val">3</div>
          <div class="stat-label">Channels</div>
        </div>
        <div>
          <div class="stat-val">6</div>
          <div class="stat-label">Videos/Day</div>
        </div>
        <div>
          <div class="stat-val">4 PM</div>
          <div class="stat-label">Auto EDT</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const TOKEN = "%%TOKEN%%";

    /* ── Particles ── */
    const pc = document.getElementById('particles');
    for (let i = 0; i < 28; i++) {
      const p = document.createElement('div');
      p.className = 'p';
      p.style.cssText = `left:${Math.random()*100}%; top:${50+Math.random()*50}%; --d:${4+Math.random()*6}s; --delay:${Math.random()*8}s;`;
      pc.appendChild(p);
    }

    /* ── 3D tilt on mouse move ── */
    const scene = document.getElementById('scene');
    const card  = document.getElementById('card');
    document.addEventListener('mousemove', e => {
      const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
      const rx = (e.clientY - cy) / cy * 6;
      const ry = (e.clientX - cx) / cx * 6;
      card.style.transform = `rotateX(${-rx}deg) rotateY(${ry}deg) translateY(-4px)`;
    });
    document.addEventListener('mouseleave', () => {
      card.style.transform = 'rotateX(6deg) rotateY(-1deg)';
    });

    /* ── Trigger ── */
    function triggerPipeline() {
      const btn   = document.getElementById('btn');
      const dot   = document.getElementById('dot');
      const row   = document.getElementById('status-row');
      const stxt  = document.getElementById('status-text');
      const msg   = document.getElementById('msg');
      const prog  = document.getElementById('prog-wrap');
      const bar   = document.getElementById('prog-bar');

      btn.disabled = true;
      btn.innerHTML = '⏳&nbsp; Generating…';
      dot.className = 'dot running';
      row.className = 'status-row running';
      stxt.textContent = 'Pipeline Running';
      msg.className = 'msg running';
      msg.textContent = 'Script → Voices → Clips → Assembly → Upload  (~20 min)';

      prog.classList.add('visible');
      setTimeout(() => { bar.style.width = '85%'; }, 100);

      const url = TOKEN ? `/run?token=${TOKEN}` : '/run';
      fetch(url)
        .then(r => r.text())
        .then(t => {
          msg.className = 'msg ok';
          msg.textContent = '✓ ' + t.trim() + ' — check Railway logs';
        })
        .catch(e => {
          btn.disabled = false;
          btn.innerHTML = '⚡&nbsp; Generate Videos';
          dot.className = 'dot';
          row.className = 'status-row';
          stxt.textContent = 'Scheduler Online';
          msg.className = 'msg err';
          msg.textContent = '✕ ' + e.message;
          prog.classList.remove('visible');
          bar.style.width = '0%';
        });
    }
  </script>
</body>
</html>
